<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Xoltra Companion — Options</title>
  <link rel="stylesheet" href="sidepanel.css" />
  <style>
    body { display: flex; justify-content: center; padding: 40px 16px; }
    .options { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 16px; }
    h1 { font-size: 16px; margin: 0; letter-spacing: -0.01em; }
    h2 { font-size: 11px; margin: 0; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-secondary); }
    section { display: flex; flex-direction: column; gap: 8px; padding: 14px; }
    label span { display: block; font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="options.js"></script>
</body>
</html>
